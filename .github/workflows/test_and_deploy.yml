name: testing

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [next, qa, main]
    tags: ["v*"]

# cancel previous job if new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PKG_NAME: usansred

jobs:
  #################
  ### Run Tests ###
  #################

  tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          manifest-path: pyproject.toml

      - name: Run tests not using the data repo nor the SNS-mount
        run: pixi run test-datalight

      - name: Run tests using the data repo but not the SNS-mount
        run: pixi run test-datarepo

      - name: Combine coverage reports
        run: pixi run combine-coverage

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v5
        if: github.actor != 'dependabot[bot]'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  ##############################
  ### Package and Deployment ###
  ##############################

  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 100
          fetch-tags: true
          ref: ${{ github.ref }}

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4

      - name: Build conda package
        run: |
          pixi run conda-build
          # prepare the local channel for verification
          rm -rf /tmp/local-channel
          mkdir -p /tmp/local-channel/linux-64
          cp ${{ env.PKG_NAME }}-*.conda /tmp/local-channel/linux-64

      - name: Verify Conda Package
        uses: neutrons/conda-actions/pkg-verify@v1
        with:
          python-version: "3.11"
          package-name: ${{ env.PKG_NAME }}
          local-channel: /tmp/local-channel
          extra-channels: mantid neutrons
          extra-commands: |
            pixi run python -c "import mantid"
            pixi run python -c "import finddata"

      - name: Upload conda package as artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-conda-package
          path: ${{ env.PKG_NAME }}-*.conda

  publish:
    name: Upload package to anaconda
    runs-on: ubuntu-24.04
    needs: [tests, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4

      - name: Download conda package artifact
        uses: actions/download-artifact@v8
        with:
          name: artifact-conda-package

      - name: Upload package to anaconda
        uses: neutrons/conda-actions/publish@main
        with:
          anaconda-token: ${{ secrets.ANACONDA_TOKEN }}
          organization: neutrons
          package-path: ${{ env.PKG_NAME }}-*.conda

      - name: Remove old packages
        if: github.ref == 'refs/heads/next'
        uses: neutrons/conda-actions/pkg-remove@v1
        with:
          anaconda_token: ${{ secrets.ANACONDA_TOKEN }}
          organization: neutrons
          package_name: ${{ env.PKG_NAME }}
          label: ${{ env.CONDA_LABEL }}
          keep: 5

  # Trigger GitLab dev deploy pipeline
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/next'
    steps:
      - name: Get Environment Name
        uses: neutrons/branch-mapper@main
        id: env_name
        with:
          prefix: usansred

      - name: Trigger Dev Deploy
        # use https://github.com/eic/trigger-gitlab-ci/pull/14 until merged
        uses: eic/trigger-gitlab-ci@d984d8d53d871d2fdc1325639d94322da6e8747f
        id: trigger
        with:
          url: https://code.ornl.gov
          project_id: 19016
          ref_name: main
          token: ${{ secrets.GITLAB_DEPLOY_TOKEN }}

      - name: Annotate commit
        uses: peter-evans/commit-comment@v4
        with:
          body: |
            GitLab pipeline for ${{ steps.env_name.outputs.name }} has been submitted for this commit: ${{ steps.trigger.outputs.web_url }}
